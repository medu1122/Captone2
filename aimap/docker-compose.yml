services:
  # POSTGRES CỤC BỘ CHO DEV; VPS: GHI DATABASE_URL TRONG aimap/.env
  db:
    image: postgres:16-alpine
    container_name: aimap-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: aimap_local
      POSTGRES_DB: aimap
    volumes:
      - aimap-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aimap"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aimap-backend
    ports:
      - "4111:4111"
    environment:
      - NODE_ENV=production
      - PORT=4111
      # MẶC ĐỊNH KẾT NỐI @db; CÓ .env THÌ DÙNG DATABASE_URL TRONG .ENV
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:aimap_local@db:5432/aimap}
      - DATABASE_SSL=${DATABASE_SSL:-false}
      - JWT_SECRET=${JWT_SECRET:-aimap-jwt-secret-change-me}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - API_PUBLIC_URL=${API_PUBLIC_URL:-http://localhost}
      - ASSET_STORAGE_PATH=/app/storage
      - DOCKER_SOCKET_PATH=/var/run/docker.sock
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - MAIL_FROM=${MAIL_FROM:-AIMAP <noreply@localhost>}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_IMAGE_MODEL=${OPENAI_IMAGE_MODEL:-gpt-image-1}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_IMAGEN_MODEL=${GEMINI_IMAGEN_MODEL:-imagen-3.0-generate-002}
      - GEMINI_IMAGE_MODEL=${GEMINI_IMAGE_MODEL:-gemini-2.5-flash-preview-05-20}
      - CREDIT_VND_RATE=${CREDIT_VND_RATE:-1000}
      - PAYMENT_MIN_AMOUNT_VND=${PAYMENT_MIN_AMOUNT_VND:-10000}
      - PAYMENT_EXPIRY_MINUTES=${PAYMENT_EXPIRY_MINUTES:-30}
      - PAYMENT_METHOD_VIETQR=${PAYMENT_METHOD_VIETQR:-1}
      - VIETQR_BANK_BIN=${VIETQR_BANK_BIN:-}
      - VIETQR_ACCOUNT_NO=${VIETQR_ACCOUNT_NO:-}
      - VIETQR_WEBHOOK_BEARER=${VIETQR_WEBHOOK_BEARER:-}
      - VIETQR_CLIENT_USERNAME=${VIETQR_CLIENT_USERNAME:-}
      - VIETQR_CLIENT_PASSWORD=${VIETQR_CLIENT_PASSWORD:-}
      - VIETQR_CALLBACK_SECRET=${VIETQR_CALLBACK_SECRET:-}
    volumes:
      - backend-storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: aimap-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-storage:
  aimap-pgdata:
