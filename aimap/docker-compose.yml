services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aimap-backend
    ports:
      - "4111:4111"
    environment:
      - NODE_ENV=production
      - PORT=4111
      - DATABASE_URL=postgresql://postgres:Thinh%401234@host.docker.internal:5432/aimap
      - DATABASE_SSL=false
      - JWT_SECRET=aimap-jwt-secret-production-2026
      - FRONTEND_URL=http://103.77.215.133
      - ASSET_STORAGE_PATH=/app/storage
      - DOCKER_SOCKET_PATH=/var/run/docker.sock
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_SECURE=false
      - SMTP_USER=chuanbiradi@gmail.com
      - SMTP_PASS=ssem avrq dgvm uips
      - MAIL_FROM=AIMAP <AIMAP@gmail.com>
    volumes:
      - backend-storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://103.77.215.133:4111
    container_name: aimap-frontend
    ports:
      # Port 80 trên host thường bị Nginx/Apache chiếm → dùng 8080
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-storage:
