# AIMAP – Backend + Frontend (đóng gói Docker)
# Chạy: docker compose up --build
# Truy cập: http://localhost:3000 (UI), http://localhost:4000 (API trực tiếp)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
