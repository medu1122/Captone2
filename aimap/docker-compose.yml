services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aimap-backend
    ports:
      - "4111:4111"
    environment:
      - NODE_ENV=production
      - PORT=4111
      - DATABASE_URL=postgresql://postgres:Thinh%401234@host.docker.internal:5432/aimap
      - DATABASE_SSL=false
      - JWT_SECRET=aimap-jwt-secret-production-2026
      - FRONTEND_URL=https://captone2.site
      - API_PUBLIC_URL=https://captone2.site
      - ASSET_STORAGE_PATH=/app/storage
      - DOCKER_SOCKET_PATH=/var/run/docker.sock
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_SECURE=false
      - SMTP_USER=chuanbiradi@gmail.com
      - SMTP_PASS=ssem avrq dgvm uips
      - MAIL_FROM=AIMAP <AIMAP@gmail.com>
      # API keys — docker-compose reads these from aimap/.env on the VPS (gitignored)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_IMAGE_MODEL=${OPENAI_IMAGE_MODEL:-gpt-image-1}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_IMAGEN_MODEL=${GEMINI_IMAGEN_MODEL:-imagen-3.0-generate-002}
      - GEMINI_IMAGE_MODEL=${GEMINI_IMAGE_MODEL:-gemini-2.5-flash-preview-05-20}
    volumes:
      - backend-storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Dùng /api để gọi same-origin; Nginx trong container proxy /api → backend
      args:
        VITE_API_URL: /api
    container_name: aimap-frontend
    ports:
      # Port 80 trên host thường bị Nginx chiếm → bind 8080; Nginx host proxy domain:80 → 8080
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-storage:
